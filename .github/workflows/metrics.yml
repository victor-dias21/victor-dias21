name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Generate profile metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ github.token }}
          user: victor-dias21
          filename: github-metrics.svg
          committer_message: "chore(metrics): atualiza github metrics [skip ci]"
          config_timezone: America/Sao_Paulo
          config_order: base.header, isocalendar, languages, activity
          base: header
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 30
